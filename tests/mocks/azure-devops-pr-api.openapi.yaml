openapi: 3.0.0
info:
  title: Azure DevOps PR API
  version: "7.1"
servers:
  - url: /
paths:
  /{organization}/{project}/_apis/git/repositories/{repositoryId}/pullRequests/{pullRequestId}:
    get:
      operationId: getPullRequest
      summary: Get pull request details
      parameters:
        - name: organization
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
        - name: repositoryId
          in: path
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: string
        - name: api-version
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Pull request details
          content:
            application/json:
              schema:
                type: object
                properties:
                  pullRequestId:
                    type: integer
                  title:
                    type: string
                  description:
                    type: string
                  lastMergeSourceCommit:
                    type: object
                    properties:
                      commitId:
                        type: string
                  lastMergeTargetCommit:
                    type: object
                    properties:
                      commitId:
                        type: string
              examples:
                PR_OPEN:
                  value:
                    pullRequestId: 42
                    title: "feat: add review automation"
                    description: "Automates code review using OpenAI"
                    lastMergeSourceCommit:
                      commitId: "abc123def456"
                    lastMergeTargetCommit:
                      commitId: "789xyz000111"

  /{organization}/{project}/_apis/git/repositories/{repositoryId}/pullRequests/{pullRequestId}/iterations:
    get:
      operationId: getPullRequestIterations
      summary: Get pull request iterations
      parameters:
        - name: organization
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
        - name: repositoryId
          in: path
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: string
        - name: api-version
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of iterations
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        description:
                          type: string
                  count:
                    type: integer
              examples:
                ITERATIONS_LIST:
                  value:
                    value:
                      - id: 1
                        description: "Initial push"
                    count: 1

  /{organization}/{project}/_apis/git/repositories/{repositoryId}/pullRequests/{pullRequestId}/iterations/{iterationId}/changes:
    get:
      operationId: getPullRequestChanges
      summary: Get pull request iteration changes
      parameters:
        - name: organization
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
        - name: repositoryId
          in: path
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: string
        - name: iterationId
          in: path
          required: true
          schema:
            type: string
        - name: api-version
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of changes
          content:
            application/json:
              schema:
                type: object
                properties:
                  changeEntries:
                    type: array
                    items:
                      type: object
                      properties:
                        changeType:
                          type: integer
                        item:
                          type: object
                          properties:
                            path:
                              type: string
                            objectId:
                              type: string
              examples:
                CHANGES_LIST:
                  value:
                    changeEntries:
                      - changeType: 1
                        item:
                          path: "/src/app.js"
                          objectId: "aaa111"
                      - changeType: 2
                        item:
                          path: "/src/Service.cs"
                          objectId: "bbb222"

  /{organization}/{project}/_apis/git/repositories/{repositoryId}/diffs/commits:
    get:
      operationId: getCommitDiff
      summary: Get diff between two commits
      parameters:
        - name: organization
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
        - name: repositoryId
          in: path
          required: true
          schema:
            type: string
        - name: baseVersion
          in: query
          required: false
          schema:
            type: string
        - name: baseVersionType
          in: query
          required: false
          schema:
            type: string
        - name: targetVersion
          in: query
          required: false
          schema:
            type: string
        - name: targetVersionType
          in: query
          required: false
          schema:
            type: string
        - name: api-version
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Diff between two commits
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      type: object
                      properties:
                        changeType:
                          type: integer
                        item:
                          type: object
                          properties:
                            path:
                              type: string
                            objectId:
                              type: string
              examples:
                COMMIT_DIFF:
                  value:
                    changes:
                      - changeType: 1
                        item:
                          path: "/src/app.js"
                          objectId: "aaa111"
                      - changeType: 2
                        item:
                          path: "/src/Service.cs"
                          objectId: "bbb222"

  /{organization}/{project}/_apis/git/repositories/{repositoryId}/items:
    get:
      operationId: getItem
      summary: Get file content
      parameters:
        - name: organization
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
        - name: repositoryId
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: false
          schema:
            type: string
        - name: versionDescriptor.version
          in: query
          required: false
          schema:
            type: string
        - name: versionDescriptor.versionType
          in: query
          required: false
          schema:
            type: string
        - name: api-version
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            text/plain:
              schema:
                type: string
              examples:
                FILE_JS_CONTENT:
                  value: |
                    // app.js
                    export function greet(name) {
                      return `Hello, ${name}!`;
                    }
                FILE_CS_CONTENT:
                  value: |
                    // Service.cs
                    public class Service {
                      public string Hello(string name) {
                        return $"Hello, {name}!";
                      }
                    }

  /{organization}/{project}/_apis/git/repositories/{repositoryId}/pullRequests/{pullRequestId}/threads:
    post:
      operationId: createThread
      summary: Create a pull request thread (comment)
      parameters:
        - name: organization
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
        - name: repositoryId
          in: path
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: string
        - name: api-version
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comments:
                  type: array
                  items:
                    type: object
                    properties:
                      content:
                        type: string
                      commentType:
                        type: integer
                status:
                  type: integer
            examples:
              THREAD_CREATED:
                value:
                  comments:
                    - content: "Test comment"
                      commentType: 1
                  status: 1
      responses:
        "201":
          description: Thread created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
              examples:
                THREAD_CREATED:
                  value:
                    id: 1001
                    status: "active"
