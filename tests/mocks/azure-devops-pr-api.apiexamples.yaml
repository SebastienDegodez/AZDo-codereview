apiVersion: mocks.microcks.io/v1alpha1
kind: APIExamples
metadata:
  name: Azure DevOps PR API
  version: "7.1"
operations:
  "GET /{organization}/{project}/_apis/git/repositories/{repo}/pullRequests/{prId}":
    PR_OPEN:
      request:
        parameters:
          organization: MyOrg
          project: MyProject
          repo: MyRepo
          prId: "42"
      response:
        status: 200
        headers:
          Content-Type: application/json
        body: |-
          {
            "pullRequestId": 42,
            "title": "feat: add new feature",
            "description": "This PR adds a new feature to the application.",
            "status": "active",
            "lastMergeSourceCommit": {
              "commitId": "abc123def456abc123def456abc123def456abc123"
            },
            "lastMergeTargetCommit": {
              "commitId": "789xyz012789xyz012789xyz012789xyz012789xyz"
            }
          }

  "GET /{organization}/{project}/_apis/git/repositories/{repo}/pullRequests/{prId}/iterations":
    ITERATIONS_LIST:
      request:
        parameters:
          organization: MyOrg
          project: MyProject
          repo: MyRepo
          prId: "42"
      response:
        status: 200
        headers:
          Content-Type: application/json
        body: |-
          {
            "value": [
              {
                "id": 1,
                "description": "Initial push",
                "reason": "push",
                "sourceRefCommit": {
                  "commitId": "abc123def456abc123def456abc123def456abc123"
                },
                "targetRefCommit": {
                  "commitId": "789xyz012789xyz012789xyz012789xyz012789xyz"
                }
              }
            ],
            "count": 1
          }

  "GET /{organization}/{project}/_apis/git/repositories/{repo}/pullRequests/{prId}/iterations/{iterationId}/changes":
    CHANGES_LIST:
      request:
        parameters:
          organization: MyOrg
          project: MyProject
          repo: MyRepo
          prId: "42"
          iterationId: "1"
      response:
        status: 200
        headers:
          Content-Type: application/json
        body: |-
          {
            "changeEntries": [
              {
                "changeId": 1,
                "changeType": 1,
                "item": {
                  "path": "/src/app.js",
                  "gitObjectType": "blob",
                  "commitId": "abc123def456abc123def456abc123def456abc123"
                }
              },
              {
                "changeId": 2,
                "changeType": 1,
                "item": {
                  "path": "/src/Service.cs",
                  "gitObjectType": "blob",
                  "commitId": "abc123def456abc123def456abc123def456abc123"
                }
              }
            ]
          }

  "GET /{organization}/{project}/_apis/git/repositories/{repo}/items":
    FILE_JS_CONTENT:
      request:
        parameters:
          organization: MyOrg
          project: MyProject
          repo: MyRepo
          path: /src/app.js
      response:
        status: 200
        headers:
          Content-Type: application/json
        body: |-
          {
            "content": "console.log('Hello, World!');\n\nfunction add(a, b) {\n  return a + b;\n}\n\nexport { add };\n",
            "path": "/src/app.js",
            "commitId": "abc123def456abc123def456abc123def456abc123"
          }
    FILE_CS_CONTENT:
      request:
        parameters:
          organization: MyOrg
          project: MyProject
          repo: MyRepo
          path: /src/Service.cs
      response:
        status: 200
        headers:
          Content-Type: application/json
        body: |-
          {
            "content": "using System;\n\nnamespace MyApp\n{\n    public class Service\n    {\n        public string GetMessage()\n        {\n            return \"Hello, World!\";\n        }\n    }\n}\n",
            "path": "/src/Service.cs",
            "commitId": "abc123def456abc123def456abc123def456abc123"
          }

  "POST /{organization}/{project}/_apis/git/repositories/{repo}/pullRequests/{prId}/threads":
    THREAD_CREATED:
      request:
        parameters:
          organization: MyOrg
          project: MyProject
          repo: MyRepo
          prId: "42"
        body: |-
          {
            "comments": [
              {
                "parentCommentId": 0,
                "content": "Code review comment",
                "commentType": 1
              }
            ],
            "status": 1
          }
      response:
        status: 201
        headers:
          Content-Type: application/json
        body: |-
          {
            "id": 1,
            "publishedDate": "2024-01-15T10:30:00Z",
            "lastUpdatedDate": "2024-01-15T10:30:00Z",
            "comments": [
              {
                "id": 1,
                "parentCommentId": 0,
                "content": "Code review comment",
                "commentType": 1,
                "publishedDate": "2024-01-15T10:30:00Z"
              }
            ],
            "status": 1,
            "isDeleted": false
          }
