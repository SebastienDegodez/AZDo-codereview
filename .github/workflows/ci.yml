name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Unit tests — outside-in on Application layer, no Docker required
      - name: Run unit tests
        run: npm run test:unit

      # Integration tests — Microcks via Testcontainers (Docker available on ubuntu-latest)
      - name: Run integration tests (Testcontainers + Microcks)
        run: npm run test:integration
