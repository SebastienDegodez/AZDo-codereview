name: Auto Tag, Release & Publish

on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    name: Bump version and create tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.new_version.outputs.tag }}
      new_version: ${{ steps.new_version.outputs.version }}
      bump: ${{ steps.bump.outputs.bump }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last tag
        id: last_tag
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi
          echo "tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Determine version bump from Conventional Commits
        id: bump
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log HEAD --pretty=format:"%s%n%b")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b")
          fi

          BUMP="none"

          while IFS= read -r line; do
            if echo "$line" | grep -qiE '(^feat!:|^fix!:|^[a-z]+(\(.+\))?!:|BREAKING CHANGE:)'; then
              BUMP="major"
              break
            elif echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            elif echo "$line" | grep -qE '^(fix|perf|refactor|chore|docs|style|test|ci|build)(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"

          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"

      - name: Skip if no conventional commits found
        if: steps.bump.outputs.bump == 'none'
        run: |
          echo "No conventional commits found -- skipping release."
          exit 0

      - name: Calculate new version
        if: steps.bump.outputs.bump != 'none'
        id: new_version
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          VERSION="${LAST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${{ steps.bump.outputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.bump.outputs.bump != 'none'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Update package.json version
        if: steps.bump.outputs.bump != 'none'
        run: |
          npm version "${{ steps.new_version.outputs.version }}" --no-git-tag-version --ignore-scripts

      - name: Commit and push package.json update
        if: steps.bump.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.new_version.outputs.tag }} [skip ci]"
          git push origin main

      - name: Create and push tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          git tag "${{ steps.new_version.outputs.tag }}"
          git push origin "${{ steps.new_version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.new_version.outputs.tag }}" \
            --generate-notes \
            --title "${{ steps.new_version.outputs.tag }}"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: auto-tag
    if: needs.auto-tag.outputs.bump != 'none'
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.new_tag }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests (Testcontainers + Microcks)
        run: npm run test:integration

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [auto-tag, build-and-test]
    if: needs.auto-tag.outputs.bump != 'none'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.new_tag }}

      - name: Set up Node.js 20 with GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sebastiendegodez"

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
